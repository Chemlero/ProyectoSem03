<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juancho no hace tareas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Sistema de ventas</h1>
  <div class="container">
    <form>
      <label for="name">Cliente:</label>
      <input type="text" id="name" name="name" required>

      <label for="producto">Producto:</label>
      <input type="text" id="producto" name="producto" required>

      <label for="count">Cantidad: <span id="count-value">1</span></label>
      <input type="range" name="count" id="count" min="1" max="10" required>
      
      <label for="precio">Precio: <span id="precio-value">1</span></label>
      <input type="range" name="precio" id="precio" min="1" max="1000" required>

      <button type="calculate" id="calculate">Calcular</button>
      <button type="submit" id="submit">Enviar</button>
    </form>

    <div class="preview">
      <h2>Total</h2>
      <ul id="total">$0.00</ul>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
